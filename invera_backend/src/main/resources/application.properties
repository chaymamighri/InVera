spring.application.name=InVera

# ================= SERVER =================
server.port=8081

# ================= URL APPLICATION =================
#app.url=http://localhost:8081
app.url=http://localhost:5173


# ================= BASE ERP (template) =================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ================= BASE PLATEFORME (SaaS) =================
platform.datasource.url=${PLATFORM_DB_URL}
platform.datasource.username=${PLATFORM_DB_USERNAME}
platform.datasource.password=${PLATFORM_DB_PASSWORD}
platform.datasource.driver-class-name=org.postgresql.Driver

# ================= JPA =================
spring.jpa.database=POSTGRESQL
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect  # Commenté car warning
spring.jpa.properties.hibernate.default_batch_fetch_size=20
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy

# ================= JWT =================
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration=${JWT_EXPIRATION}
app.frontend.activation-url=http://localhost:5173/create-password

# ================= EMAIL =================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.protocol=smtp
spring.mail.default-encoding=UTF-8
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# ================= CHIFFREMENT =================
encryption.secret.key=${INVERA_ENCRYPTION_KEY}
encryption.key=0123456789abcdef0123456789abcdef

# ================= FICHIERS =================
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# ================= LOGS =================
logging.level.org.springframework.security=DEBUG
logging.level.org.erp.invera=DEBUG

# ================= INTERNATIONALISATION =================
spring.messages.basename=messages
spring.messages.encoding=UTF-8

# ================= KONNECT CONFIGURATION =================
# Mode TEST (Sandbox) - Les valeurs viennent du .env
konnect.api.url=${konnect.api.url}
konnect.api.key=${konnect.api.key}
konnect.wallet.id=${konnect.wallet.id}